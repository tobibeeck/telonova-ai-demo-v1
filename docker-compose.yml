services:
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      DATABASE_PATH: /app/data/telonova.db
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
